<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>露天矿山3D监控系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0a0e17; color: #e0e6f0; }
    .app-container { position: relative; width: 100%; height: 100%; }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; justify-content: center; gap: 24px; padding: 12px 20px; background: linear-gradient(180deg, rgba(8,12,24,0.95) 0%, rgba(8,12,24,0.6) 80%, transparent 100%); pointer-events: none; }
    .stat-card { pointer-events: auto; background: rgba(20,30,55,0.85); border: 1px solid rgba(60,130,255,0.25); border-radius: 10px; padding: 10px 22px; min-width: 160px; text-align: center; backdrop-filter: blur(8px); }
    .stat-card .label { font-size: 12px; color: #7a8bb5; margin-bottom: 4px; letter-spacing: 1px; }
    .stat-card .value { font-size: 26px; font-weight: 700; color: #4ea8ff; }
    .stat-card .value.warn { color: #ff6b4a; }
    .stat-card .unit { font-size: 12px; color: #7a8bb5; margin-left: 2px; }
    .left-panel { position: absolute; top: 80px; left: 12px; bottom: 80px; width: 240px; z-index: 10; background: rgba(12,18,36,0.88); border: 1px solid rgba(60,130,255,0.18); border-radius: 12px; overflow-y: auto; backdrop-filter: blur(10px); }
    .left-panel::-webkit-scrollbar { width: 4px; }
    .left-panel::-webkit-scrollbar-thumb { background: rgba(60,130,255,0.3); border-radius: 2px; }
    .panel-title { font-size: 14px; font-weight: 600; padding: 14px 16px 8px; color: #8ab4f8; letter-spacing: 1px; border-bottom: 1px solid rgba(60,130,255,0.12); }
    .equip-group { padding: 6px 12px; }
    .equip-group-title { font-size: 12px; color: #5a7aaa; padding: 6px 4px 4px; text-transform: uppercase; letter-spacing: 1px; }
    .equip-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s; font-size: 13px; color: #c0ccde; }
    .equip-item:hover { background: rgba(60,130,255,0.12); }
    .equip-item.active { background: rgba(60,130,255,0.2); border: 1px solid rgba(60,130,255,0.3); }
    .equip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .equip-dot.online { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
    .equip-dot.offline { background: #6b7280; }
    .bottom-bar { position: absolute; bottom: 0; left: 260px; right: 260px; z-index: 10; background: linear-gradient(0deg, rgba(8,12,24,0.95) 0%, rgba(8,12,24,0.6) 80%, transparent 100%); padding: 12px 24px 16px; }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .timeline-header .title { font-size: 13px; color: #7a8bb5; letter-spacing: 1px; }
    .timeline-header .date { font-size: 14px; color: #4ea8ff; font-weight: 600; }
    .timeline-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 6px; background: rgba(60,130,255,0.15); border-radius: 3px; outline: none; cursor: pointer; }
    .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #4ea8ff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(78,168,255,0.5); }
    .timeline-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .timeline-labels span { font-size: 11px; color: #4a6080; }
    .right-panel { position: absolute; top: 80px; right: 12px; bottom: 80px; width: 250px; z-index: 10; background: rgba(12,18,36,0.88); border: 1px solid rgba(255,107,74,0.18); border-radius: 12px; overflow-y: auto; backdrop-filter: blur(10px); }
    .right-panel::-webkit-scrollbar { width: 4px; }
    .right-panel::-webkit-scrollbar-thumb { background: rgba(255,107,74,0.3); border-radius: 2px; }
    .right-panel .panel-title { color: #ff8a6b; border-bottom-color: rgba(255,107,74,0.12); }
    .alert-item { padding: 10px 14px; margin: 6px 10px; background: rgba(255,60,60,0.06); border: 1px solid rgba(255,80,60,0.15); border-radius: 8px; }
    .alert-item.critical { border-color: rgba(255,60,60,0.4); background: rgba(255,60,60,0.1); }
    .alert-item.warning { border-color: rgba(255,180,50,0.3); background: rgba(255,180,50,0.06); }
    .alert-item.info { border-color: rgba(60,130,255,0.2); background: rgba(60,130,255,0.04); }
    .alert-type { font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
    .alert-type.critical { color: #ff4a3a; }
    .alert-type.warning { color: #ffb432; }
    .alert-type.info { color: #4ea8ff; }
    .alert-msg { font-size: 13px; color: #c0ccde; line-height: 1.5; }
    .alert-meta { font-size: 11px; color: #5a7aaa; margin-top: 4px; display: flex; justify-content: space-between; }
    .detail-popup { position: absolute; z-index: 20; background: rgba(14,20,40,0.95); border: 1px solid rgba(60,130,255,0.3); border-radius: 12px; padding: 18px; min-width: 260px; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: auto; }
    .detail-popup .close-btn { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #7a8bb5; font-size: 18px; cursor: pointer; }
    .detail-popup .close-btn:hover { color: #fff; }
    .detail-popup .title { font-size: 16px; font-weight: 700; color: #8ab4f8; margin-bottom: 12px; }
    .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(60,130,255,0.08); font-size: 13px; }
    .detail-row .label { color: #7a8bb5; }
    .detail-row .value { color: #e0e6f0; font-weight: 600; }
    .canvas-wrapper { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
